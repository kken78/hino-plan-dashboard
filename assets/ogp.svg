<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b6e8c"/>
      <stop offset="1" stop-color="#2c5269"/>
    </linearGradient>
    <linearGradient id="barfade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 右上の装飾波（柔らかい曲線） -->
  <path d="M1200,0 L1200,260 C1040,300 980,150 820,200 C700,236 640,120 540,150 L540,0 Z" fill="#ffffff" opacity="0.05"/>
  <path d="M0,630 L0,470 C160,430 240,560 420,520 C560,490 660,600 820,560 L1200,560 L1200,630 Z" fill="#ffffff" opacity="0.06"/>

  <!-- 左：テキストブロック -->
  <g font-family="Noto Sans CJK JP, sans-serif">
    <!-- eyebrow -->
    <text x="80" y="118" fill="#cfe2ee" font-size="23" font-weight="700" letter-spacing="4">滋賀県 日野町</text>
    <rect x="80" y="138" width="64" height="4" rx="2" fill="#8fc4dd"/>

    <!-- タイトル -->
    <text x="78" y="226" fill="#ffffff" font-size="72" font-weight="900" letter-spacing="1">総合計画</text>
    <text x="78" y="310" fill="#ffffff" font-size="60" font-weight="900" letter-spacing="0">進捗ダッシュボード</text>

    <!-- 将来像 -->
    <text x="82" y="380" fill="#dceaf2" font-size="25" font-weight="500">「だれもが輝き ともに創るまち&#8220;日野&#8221;」</text>

    <!-- メトリクス行 -->
    <g font-weight="900">
      <text x="82" y="500" fill="#ffffff" font-size="58">34</text>
      <text x="148" y="500" fill="#bcd6e4" font-size="24" font-weight="700">分野</text>
      <text x="262" y="500" fill="#ffffff" font-size="58">76</text>
      <text x="326" y="500" fill="#bcd6e4" font-size="24" font-weight="700">KPI</text>
      <text x="430" y="500" fill="#ffffff" font-size="58">3</text>
      <text x="466" y="500" fill="#bcd6e4" font-size="24" font-weight="700">情報源を統合</text>
    </g>
    <text x="84" y="536" fill="#9fc0d2" font-size="19" font-weight="500">KPI・進捗　/　実施計画　/　住民意識調査</text>
  </g>

  <!-- 右：ミニ・ダッシュボードカード -->
  <g filter="url(#soft)">
    <rect x="760" y="150" width="372" height="330" rx="20" fill="#ffffff"/>
  </g>
  <g font-family="Noto Sans CJK JP, sans-serif">
    <text x="790" y="196" fill="#23303a" font-size="20" font-weight="800">KPI・進捗</text>
    <text x="790" y="220" fill="#5c6b75" font-size="14" font-weight="600">基準値 → 中間目標(R7) → 最終(R12)</text>

    <!-- バー群（達成度イメージ） -->
    <!-- 1 -->
    <text x="790" y="262" fill="#3a4750" font-size="14" font-weight="700">子育てサポート</text>
    <rect x="790" y="270" width="312" height="12" rx="6" fill="#eef1f3"/>
    <rect x="790" y="270" width="190" height="12" rx="6" fill="#2f9e57"/>
    <!-- 2 -->
    <text x="790" y="306" fill="#3a4750" font-size="14" font-weight="700">待機児童数</text>
    <rect x="790" y="314" width="312" height="12" rx="6" fill="#eef1f3"/>
    <rect x="790" y="314" width="248" height="12" rx="6" fill="#d9534f"/>
    <!-- 3 -->
    <text x="790" y="350" fill="#3a4750" font-size="14" font-weight="700">公共交通 利用</text>
    <rect x="790" y="358" width="312" height="12" rx="6" fill="#eef1f3"/>
    <rect x="790" y="358" width="142" height="12" rx="6" fill="#2f9e57"/>
    <!-- 4 -->
    <text x="790" y="394" fill="#3a4750" font-size="14" font-weight="700">耐震化率</text>
    <rect x="790" y="402" width="312" height="12" rx="6" fill="#eef1f3"/>
    <rect x="790" y="402" width="96" height="12" rx="6" fill="#2f9e57"/>

    <!-- 5本柱の色チップ -->
    <g>
      <circle cx="798" cy="448" r="9" fill="#E4567B"/>
      <circle cx="822" cy="448" r="9" fill="#E8923A"/>
      <circle cx="846" cy="448" r="9" fill="#5BA84F"/>
      <circle cx="870" cy="448" r="9" fill="#3B9BC4"/>
      <circle cx="894" cy="448" r="9" fill="#8B6BB0"/>
      <text x="916" y="454" fill="#5c6b75" font-size="14" font-weight="700">5つの政策の柱</text>
    </g>
  </g>

  <!-- 下部 プロトタイプ帯 -->
  <text x="80" y="600" font-family="Noto Sans CJK JP, sans-serif" fill="#86abc0" font-size="16" font-weight="600">プロトタイプ ／ 公開データから作成（非公式・実証実験）</text>
</svg>
